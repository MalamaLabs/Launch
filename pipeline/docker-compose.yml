version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  kafka:
    image: bitnami/kafka:latest
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr"
      - "0.0.0.0:8181"
      - "/policies"
    volumes:
      - ../ai-validator/policies:/policies
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging

  ai-validator:
    build:
      context: ../ai-validator
    depends_on:
      kafka:
        condition: service_healthy
      opa:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - KAFKA_BROKER=kafka:9092
      - OPA_URL=http://opa:8181/v1/data/malama/sensor
    restart: unless-stopped
    logging: *default-logging

  batch-processor:
    build:
      context: .
    command: ["python", "batch_processor.py"]
    depends_on:
      kafka:
        condition: service_healthy
      ai-validator:
        condition: service_started
    env_file:
      - .env
    environment:
      - KAFKA_BROKER=kafka:9092
    restart: unless-stopped
    logging: *default-logging

  anchor-service:
    build:
      context: .
    command: ["python", "anchor_service.py"]
    depends_on:
      batch-processor:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    logging: *default-logging

  mock-sensors:
    build:
      context: .
    # Reuses the standard python image inside the context to map the firmware edge scripts
    command: ["python", "../firmware/sensor_node.py"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ../firmware:/app/firmware
    working_dir: /app/firmware
    restart: unless-stopped
    logging: *default-logging
