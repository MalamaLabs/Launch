name: Continuous Integration

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  cardano-contracts:
    name: Cardano Contracts (Aiken)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/cardano
    steps:
      - uses: actions/checkout@v4
      - name: Cache Aiken
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/aiken
          key: ${{ runner.os }}-aiken-v1.0.26
      - name: Install Aiken
        run: |
          if [ ! -f ~/.local/bin/aiken ]; then
            curl -sL https://install.aiken-lang.org | bash
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build Contracts
        run: aiken build
      - name: Run Tests
        run: aiken check

  evm-contracts:
    name: EVM Contracts (Base)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/evm
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: contracts/evm/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Compile Contracts
        run: npx hardhat compile
      - name: Run Tests
        run: npx hardhat test
      - name: Check Coverage
        run: |
          npx hardhat coverage
          npx nyc check-coverage --lines 80 --functions 80 --branches 80

  ai-validator:
    name: AI Validator (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-validator
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov
      - name: Run Pytest with Coverage
        run: pytest --cov=./ --cov-report=xml --cov-fail-under=80

  web:
    name: Web Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Type Check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
