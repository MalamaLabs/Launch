name: Deploy to Testnet

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-cardano-preprod:
    name: Deploy Cardano Pre-Prod
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/cardano
    outputs:
      contract_address: ${{ steps.deploy.outputs.address }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Aiken
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/aiken
          key: ${{ runner.os }}-aiken-v1.0.26
      - name: Install Aiken
        run: |
          if [ ! -f ~/.local/bin/aiken ]; then
            curl -sL https://install.aiken-lang.org | bash
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build Contracts
        run: aiken build
      - name: Deploy to Pre-Prod
        id: deploy
        env:
          CARDANO_SIGNING_KEY: ${{ secrets.CARDANO_SIGNING_KEY }}
        run: |
          chmod +x ./scripts/deploy.sh || true
          # Note: scripts/deploy.sh handles actual network submissions
          ADDRESS=$(./scripts/deploy.sh preprod)
          echo "address=$ADDRESS" >> $GITHUB_OUTPUT

  deploy-base-sepolia:
    name: Deploy Base Sepolia
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/evm
    outputs:
      contract_address: ${{ steps.deploy.outputs.address }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: contracts/evm/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Deploy to Base Sepolia
        id: deploy
        env:
          BASE_SEPOLIA_PRIVATE_KEY: ${{ secrets.BASE_SEPOLIA_PRIVATE_KEY }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
        run: |
          # Note: hardhat deploy script logs the final contract address
          ADDRESS=$(npx hardhat run scripts/deploy.ts --network baseSepolia | grep 'Deployed to:' | awk '{print $3}')
          echo "address=$ADDRESS" >> $GITHUB_OUTPUT

  post-pr-comment:
    name: Post Deployment Addresses
    runs-on: ubuntu-latest
    needs: [deploy-cardano-preprod, deploy-base-sepolia]
    steps:
      - name: Find PR
        uses: jwalton/gh-find-current-pr@v1
        id: findPr
      - name: Create PR Comment
        if: success() && steps.findPr.outputs.number
        uses: actions/github-script@v7
        env:
          CARDANO_ADDRESS: ${{ needs.deploy-cardano-preprod.outputs.contract_address }}
          BASE_ADDRESS: ${{ needs.deploy-base-sepolia.outputs.contract_address }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = process.env.PR_NUMBER || context.issue.number;
            const body = `### 🚀 Testnet Deployments Successful
            
            **Cardano Pre-Prod:** \`${process.env.CARDANO_ADDRESS}\`
            **Base Sepolia:** \`${process.env.BASE_ADDRESS}\``;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.findPr.outputs.pr }}'),
              body: body
            });
