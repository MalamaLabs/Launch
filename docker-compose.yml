version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - kafka-data:/var/lib/kafka/data

  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--set=decision_logs.console=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./policies:/policies:ro

  mock-sensors:
    build:
      context: ./services/mock-sensors
      dockerfile: Dockerfile
    container_name: mock-sensors
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - SENSOR_INTERVAL_MS=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./services/mock-sensors:/app

  ai-validator:
    build:
      context: ./services/ai-validator
      dockerfile: Dockerfile
    container_name: ai-validator
    depends_on:
      kafka:
        condition: service_healthy
      opa:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - OPA_URL=http://opa:8181/v1/data/malama/validate
      - IPFS_PINATA_API_KEY=${PINATA_API_KEY}
      - IPFS_PINATA_SECRET_KEY=${PINATA_SECRET_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./services/ai-validator:/app

  pipeline:
    build:
      context: ./services/pipeline
      dockerfile: Dockerfile
    container_name: pipeline
    depends_on:
      ai-validator:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=kafka:29092
      - BATCH_INTERVAL_HOURS=4
      - BLOCKCHAIN_NETWORK=testnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    volumes:
      - ./services/pipeline:/app

volumes:
  kafka-data:
